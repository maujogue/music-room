openapi: 3.0.0
info:
  title: Music App API
  version: 1.0.0
  license:
    name: Proprietary
    url: https://music-room/license

servers:
  - url: http://localhost:54321/functions/v1
    description: Local Supabase Edge functions

# All endpoints require a Bearer token by default
security:
  - bearerAuth: []

tags:
  - name: Events
    description: Routes related to events (listing, details, radar, etc.)

paths:
  ########## EVENTS
  /me/events:
    get:
      tags:
        - Events
      summary: List events for the current user
      operationId: listCurrentUserEvents
      description: >
        Returns the list of events the authenticated user is involved in
        (as owner or guest).
      responses:
        '200':
          description: List of events for the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
        '401':
          description: Unauthorized (missing or invalid JWT)

  /events:
    post:
      tags:
        - Events
      summary: Create a new event
      operationId: createEvent
      description: Creates a new event for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventInput'
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/CreateEventInput'
                - type: object
                  properties:
                    image:
                      type: string
                      format: binary
                      description: Optional image file for the event.
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Event created successfully
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized (missing or invalid JWT)


  /events/{id}:
    get:
      tags:
        - Events
      summary: Get event by id
      operationId: getEventById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The event ID.
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '401':
          description: Unauthorized (missing or invalid JWT)
        '403':
          description: Forbidden — the event is private and the user is not allowed to view it
        '404':
          description: Event not found

    put:
      tags:
        - Events
      summary: Update an existing event
      operationId: updateEventById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The event ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventInput'
      responses:
        '200':
          description: Event updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Event updated successfully
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '404':
          description: Event not found

    delete:
      tags:
        - Events
      summary: Delete an event
      operationId: deleteEventById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The event ID.
      responses:
        '204':
          description: Event deleted successfully (no content)
        '401':
          description: Unauthorized
        '404':
          description: Event not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Event:
      type: object
      required:
        - id
        - name
        - is_private
        - everyone_can_vote
        - playlistId
        - beginning_at
        - spatio_licence
        - done
      properties:
        id:
          type: string
          example: "ac4f0cd4-197e-443c-b9ff-8b9873dad829"
        name:
          type: string
          example: "Jazz Night"
        image_url:
          type: string
          format: uri
          nullable: true
          example: "https://example.com/event.jpg"
        is_private:
          type: boolean
          example: false
        everyone_can_vote:
          type: boolean
          example: true
        description:
          type: string
          nullable: true
          example: "An evening to discover local artists."
        playlist_id:
          type: string
          nullable: true
          example: "pl_abc"
        playlistId:
          type: string
          example: "pl_abc"
        beginning_at:
          type: string
          format: date-time
          example: "2025-01-10T20:00:00Z"
        spatio_licence:
          type: boolean
          example: true
        done:
          type: boolean
          example: false

    Owner:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        avatar_url:
          type: string
          nullable: true

    EventUserPermissions:
      type: object
      properties:
        role:
          type: string
          example: owner
        can_edit:
          type: boolean
        can_delete:
          type: boolean
        can_invite:
          type: boolean
        can_vote:
          type: boolean

    EventMember:
      type: object
      properties:
        profile:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
            avatar_url:
              type: string
              nullable: true
        role:
          type: string
          example: voter

    EventResponse:
      type: object
      properties:
        event:
          $ref: '#/components/schemas/Event'
        owner:
          $ref: '#/components/schemas/Owner'
        user:
          $ref: '#/components/schemas/EventUserPermissions'
        members:
          type: array
          items:
            $ref: '#/components/schemas/EventMember'

    Location:
      type: object
      properties:
        coordinates:
          type: object
          properties:
            lat:
              type: number
              example: 37.42221
            long:
              type: number
              example: -122.0853
        city:
          type: string
          nullable: true
          example: "Mountain View"
        address:
          type: string
          nullable: true
          example: "160 Castro St"
        country:
          type: string
          nullable: true
          example: "USA"
        venuename:
          type: string
          nullable: true
          example: "Doppio Zero"
        complement:
          type: string
          nullable: true
          example: "CA 94041"
      required:
        - coordinates

    CreateEventInput:
      type: object
      required:
        - name
        - is_private
        - everyone_can_vote
        - playlist_id
        - beginning_at
        - spatio_licence
        - location
      properties:
        name:
          type: string
          example: "Jazz Night"
        description:
          type: string
          nullable: true
          example: "An evening to discover local artists."
        is_private:
          type: boolean
          example: false
        everyone_can_vote:
          type: boolean
          example: true
        playlist_id:
          type: string
          description: ID of the associated playlist
          example: "pl_abc"
        beginning_at:
          type: string
          format: date-time
          example: "2025-01-10T20:00:00Z"
        spatio_licence:
          type: boolean
          example: true
        location:
          $ref: '#/components/schemas/Location'

    UpdateEventInput:
      type: object
      description: >
        Fields to update on an existing event.
        All properties are optional; only provided fields will be updated.
      properties:
        name:
          type: string
          example: "Updated Jazz Night"
        description:
          type: string
          nullable: true
        is_private:
          type: boolean
        everyone_can_vote:
          type: boolean
        playlist_id:
          type: string
          description: ID of the associated playlist
        beginning_at:
          type: string
          format: date-time
        spatio_licence:
          type: boolean
        location:
          $ref: '#/components/schemas/Location'
