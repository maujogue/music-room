name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pre-commit-equivalent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Pin npm version
        run: |
          npm i -g npm@11.6.0
          npm -v

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install root dependencies
        run: npm i

      - name: Install React app dependencies
        run: npm i
        working-directory: react

      - name: Install Supabase tests dependencies
        run: npm install
        working-directory: supabase/functions/tests

      - name: Lint
        run: make lint

      - name: Format
        run: make format-check

      - name: Test
        run: make test