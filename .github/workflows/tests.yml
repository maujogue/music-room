name: 'functions-tests'
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - run: supabase start
      - run: supabase test db
      - run: deno test --config functions/deno.json --filter "^(?!spotify integration:)" --allow-all functions/tests/**/*.test.ts --env-file .env.local